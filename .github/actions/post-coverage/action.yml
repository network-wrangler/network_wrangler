name: 'Post Coverage Comment'
description: 'Download coverage artifacts and post coverage comment on PR'
inputs:
  pytest-xml-coverage-path:
    description: 'Path to pytest XML coverage file'
    required: false
    default: 'coverage/coverage.xml'
  junitxml-path:
    description: 'Path to pytest JUnit XML file'
    required: false
    default: 'coverage/pytest.xml'

runs:
  using: 'composite'
  steps:
    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        name: coverage-py3.13
        path: ./

    - name: Verify and prepare coverage files
      shell: bash
      run: |
        echo "=== Files in coverage directory ==="
        ls -lah coverage/ || echo "coverage/ directory doesn't exist"
        echo ""
        echo "=== Searching for coverage files ==="
        find . -name "coverage.xml" -o -name "pytest.xml" | head -10
        echo ""
        
        # Create coverage directory if it doesn't exist
        mkdir -p coverage
        
        # Find and move coverage.xml
        COV_FILE=$(find . -name "coverage.xml" -type f | head -1)
        if [ -n "$COV_FILE" ] && [ -f "$COV_FILE" ]; then
          if [ "$COV_FILE" != "coverage/coverage.xml" ]; then
            echo "Found coverage.xml at $COV_FILE, copying to coverage/coverage.xml"
            cp "$COV_FILE" coverage/coverage.xml
          fi
          echo "✓ coverage.xml found and prepared"
        else
          echo "✗ ERROR: coverage.xml not found anywhere in the artifact"
          echo "Artifact structure:"
          find . -type f | head -20
          exit 1
        fi
        
        # Find and move pytest.xml
        PYTEST_FILE=$(find . -name "pytest.xml" -type f | head -1)
        if [ -n "$PYTEST_FILE" ] && [ -f "$PYTEST_FILE" ]; then
          if [ "$PYTEST_FILE" != "coverage/pytest.xml" ]; then
            echo "Found pytest.xml at $PYTEST_FILE, copying to coverage/pytest.xml"
            cp "$PYTEST_FILE" coverage/pytest.xml
          fi
          echo "✓ pytest.xml found and prepared"
        else
          echo "⚠ WARNING: pytest.xml not found (may be optional)"
        fi
        
        echo ""
        echo "=== Final coverage directory contents ==="
        ls -lah coverage/
        
        # Verify coverage.xml exists before proceeding
        if [ ! -f "coverage/coverage.xml" ]; then
          echo "ERROR: coverage.xml is required but not found after preparation"
          exit 1
        fi

    - name: Pytest coverage comment
      uses: MishaKav/pytest-coverage-comment@main
      with:
        pytest-xml-coverage-path: ${{ inputs.pytest-xml-coverage-path }}
        junitxml-path: ${{ inputs.junitxml-path }}

