name: Lint, test + build docs

on: [push]

jobs:
  tests:
    permissions:
      contents: write  # Required for mike deploy and benchmark commits
      issues: write    # Required for posting benchmark comments
      pull-requests: write  # Required for posting PR comments

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Document branch
      run: echo ${{ github.ref_name }}
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Configure Git user
      run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[tests]
    - name: Lint
      run: ruff check --output-format=github network_wrangler
    - name: Run tests
      run: |
          pytest --junitxml=pytest.xml --cov=network_wrangler --cov-report "xml:coverage.xml" --benchmark-save=benchmark --benchmark-json=benchmark.json
    - name: Build docs
      run: |
        VERSION=$(echo "${{ github.ref_name }}" | tr '/' '-')
        mike deploy --push "$VERSION"
    - name: Update latest docs
      if: github.ref == 'refs/heads/main'
      run: |
        mike alias "${{ github.ref_name }}" latest --update-aliases --push
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        alert-threshold: '125%'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        comment-on-alert: false  # Disable comments for push events (only works for PRs)
        summary-always: false  # Disable summary for push events
        skip-fetch-gh-pages: true  # Skip gh-pages operations
        save-data-file: false  # Don't save to gh-pages
        auto-push: false  # Don't push to gh-pages
    - name: Pytest coverage comment
      if: github.event_name == 'pull_request'
      uses: MishaKav/pytest-coverage-comment@main
      with:
        pytest-xml-coverage-path: coverage.xml
        junitxml-path: pytest.xml
