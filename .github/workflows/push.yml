name: CI (Lint, Test, Docs, Benchmark)

on:
  push: 
    branches: [main, develop]

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"

      - name: Install ruff
        run: |
          uv pip install --system ruff
        shell: bash

      - name: Run ruff
        run: ruff check --output-format=github network_wrangler

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e .[tests]
        shell: bash

      - name: Run tests
        run: |
          pytest --junitxml=pytest.xml --cov-report "xml:coverage.xml" --benchmark-save=benchmark --benchmark-json=benchmark.json

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            pytest.xml

      - name: Upload benchmark artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-py${{ matrix.python-version }}
          path: |
            benchmark.json
            .benchmarks/

  docs:
    name: Build and deploy docs
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch name
        id: branch
        uses: ./.github/actions/get-branch-name

      - name: Build and deploy docs
        uses: ./.github/actions/build-docs
        with:
          python-version: "3.13"
          branch-name: ${{ steps.branch.outputs.branch-name }}
    - name: Build docs
      run: |
        VERSION=$(echo "${{ github.ref_name }}" | tr '/' '-')
        mike deploy --push "$VERSION"
    - name: Update latest docs
      if: github.ref == 'refs/heads/main'
      run: |
        mike alias "${{ github.ref_name }}" latest --update-aliases --push
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        alert-threshold: '125%'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        comment-on-alert: true
        summary-always: true
    - name: Pytest coverage comment
      if: github.event_name == 'pull_request'
      uses: MishaKav/pytest-coverage-comment@main
      with:
        pytest-xml-coverage-path: coverage.xml
        junitxml-path: pytest.xml

