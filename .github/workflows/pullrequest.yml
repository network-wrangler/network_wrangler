name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Only run when code changes:
    # - opened: when PR is first created
    # - synchronize: when new commits are pushed to PR branch
    # - reopened: when a closed PR is reopened (may have new code)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"

      - name: Install ruff
        run: |
          uv pip install --system ruff
        shell: bash

      - name: Run ruff
        run: ruff check --output-format=github network_wrangler

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e .[tests]
        shell: bash

      - name: Run tests
        run: |
          pytest --junitxml=pytest.xml --cov-report "xml:coverage.xml" --benchmark-save=benchmark --benchmark-json=benchmark.json

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            pytest.xml

      - name: Upload benchmark artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-py${{ matrix.python-version }}
          path: |
            benchmark.json
            .benchmarks/

  docs:
    name: Build and deploy docs
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get branch name
        id: branch
        uses: ./.github/actions/get-branch-name

      - name: Build and deploy docs
        uses: ./.github/actions/build-docs
        with:
          python-version: "3.13"
          branch-name: ${{ steps.branch.outputs.branch-name }}

      - name: Post docs comment
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = '${{ steps.branch.outputs.branch-name }}';
            const docsUrl = `https://network-wrangler.github.io/network_wrangler/${branchName}/`;
            const comment = `📚 Documentation has been built and deployed!
            
            View the docs for this PR: [${docsUrl}](${docsUrl})`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: comment,
            });

  benchmark:
    name: Analyze benchmark results
    needs: test
    if: github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Analyze benchmark
        uses: ./.github/actions/analyze-benchmark
        with:
          python-version: "3.13"
          alert-threshold: '125%'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: Post coverage comment
    needs: test
    if: github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Post coverage comment
        uses: ./.github/actions/post-coverage
